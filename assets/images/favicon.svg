<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background -->
  <rect width="64" height="64" rx="8" fill="#2f4f4f"/>

  <!-- Inkwell base -->
  <rect x="22" y="46" width="18" height="3" rx="1" fill="white"/>
  <rect x="24" y="40" width="14" height="7" rx="2" fill="white"/>
  <ellipse cx="31" cy="40" rx="5" ry="1.5" fill="#2f4f4f"/>

  <!-- Quill stem -->
  <path d="M31 38 Q28 28 18 10" stroke="white" stroke-width="1.2" fill="none" stroke-linecap="round"/>

  <!-- Quill feather right -->
  <path d="M18 10 Q26 18 31 38 Q34 28 30 14 Q26 8 18 10Z" fill="white" opacity="0.95"/>
  <!-- Quill feather left (shadow side) -->
  <path d="M18 10 Q20 20 27 34 Q22 26 20 16 Q18 12 18 10Z" fill="white" opacity="0.55"/>

  <!-- Vane lines -->
  <path d="M20 16 Q25 20 29 32" stroke="#2f4f4f" stroke-width="0.5" fill="none" opacity="0.4"/>
  <path d="M21 13 Q27 18 30 28" stroke="#2f4f4f" stroke-width="0.5" fill="none" opacity="0.3"/>
  <path d="M22 11 Q28 16 31 24" stroke="#2f4f4f" stroke-width="0.5" fill="none" opacity="0.25"/>

  <!-- Curly top -->
  <path d="M18 10 Q12 6 14 12 Q16 16 20 12" stroke="white" stroke-width="1" fill="none" stroke-linecap="round"/>
  <path d="M20 12 Q22 8 19 6 Q16 5 15 8" stroke="white" stroke-width="0.8" fill="none" stroke-linecap="round" opacity="0.75"/>

  <!-- Nib to inkwell connector -->
  <path d="M31 38 Q32 41 31 43" stroke="white" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.8"/>

  <!-- Sparkle dots -->
  <circle cx="38" cy="14" r="0.9" fill="white" opacity="0.65"/>
  <circle cx="41" cy="19" r="0.6" fill="white" opacity="0.5"/>
  <circle cx="39" cy="22" r="0.7" fill="white" opacity="0.4"/>
  <circle cx="37" cy="10" r="0.5" fill="white" opacity="0.5"/>
</svg>
